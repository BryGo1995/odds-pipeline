version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'  # local dev only — disable in any shared/cloud env
    ODDS_API_KEY: ${ODDS_API_KEY}
    DATA_DB_USER: ${DATA_DB_USER:-odds}
    DATA_DB_PASSWORD: ${DATA_DB_PASSWORD:-odds_password}
    DATA_DB_NAME: ${DATA_DB_NAME:-odds_db}
    DATA_DB_HOST: data-postgres
    DATA_DB_PORT: 5432
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - ./logs:/opt/airflow/logs
  depends_on:
    airflow-postgres:
      condition: service_healthy
    data-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data

  data-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DATA_DB_USER:-odds}
      POSTGRES_PASSWORD: ${DATA_DB_PASSWORD:-odds_password}
      POSTGRES_DB: ${DATA_DB_NAME:-odds_db}
    ports:
      - "5433:5432"
    volumes:
      - ./sql/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
      - data-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DATA_DB_USER:-odds}"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  pgadmin:
    image: dpage/pgadmin4:8.5
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - data-postgres

  postgres_exporter_data:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    hostname: odds-pipeline-postgres-data
    environment:
      DATA_SOURCE_NAME: "postgresql://${DATA_DB_USER:-odds}:${DATA_DB_PASSWORD:-odds_password}@data-postgres:5432/${DATA_DB_NAME:-odds_db}?sslmode=disable"
    restart: unless-stopped
    networks:
      - default
      - monitoring
    depends_on:
      data-postgres:
        condition: service_healthy

  postgres_exporter_airflow:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    hostname: odds-pipeline-postgres-airflow
    environment:
      DATA_SOURCE_NAME: "postgresql://airflow:airflow@airflow-postgres:5432/airflow?sslmode=disable"
    restart: unless-stopped
    networks:
      - default
      - monitoring
    depends_on:
      airflow-postgres:
        condition: service_healthy

volumes:
  airflow-postgres-data:
  data-postgres-data:

networks:
  monitoring:
    external: true
